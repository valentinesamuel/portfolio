<p class="title" id="projects"><span>03.</span>Projects</p>
<section class="project-container">
 
  <div class="project" *ngFor="let project of projectList; let i = index">
  <div class="left">
    <p class="sn">0{{i}}</p>
    <div class="details">
      <h3>{{project.name}}</h3>
      <p class="stack" >
        <span *ngFor="let tech of project.stack">{{tech}} </span>
      </p>
      <p>src</p>
    </div>
  </div>
  <div class="right">
    <a href="hello"><button>View Project</button></a>
    <img src="https://images.unsplash.com/photo-1616998643931-7f3cdba692e1?ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&ixlib=rb-1.2.1&auto=format&fit=crop&w=333&q=80" />
  </div>
</div>

  <div class="see-others">
    <button class="seeArchive" (click)="seeOtherProjects()">
      {{ seeOthers ? "Hide" : "See" }} Other Projects
    </button>
  </div>
  <div class="other-projects" *ngIf="seeOthers">
    <h2>Other Projects</h2>
    <p class="pre">
      These are other projects that i create to constantly improve my skills.
      The source codes are available on my github repositories
    </p>
    <ul class="other-list" *ngFor="let arcProj of archivedList; let i = index">
      <li>
        /{{i}} <a [href]="arcProj.repo"><span class="src">&lt;src/&gt;</span></a>
        <span class="name">{{arcProj.name}}</span>
      </li>
      
    </ul>
  </div>
</section>
