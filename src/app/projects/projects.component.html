
<section class="project-container">
  <div class="project" *ngFor="let project of projectList; let i = index">
    <div class="left">
      <p class="sn">0{{ i }}</p>
      <div class="details">
        <h3>{{ project.name }}</h3>
        <p class="stack">
          <span *ngFor="let tech of project.stack">{{ tech }} </span>
        </p>
        <a [href]="project.repo"><p class="src">&lt;src/&gt;</p></a>
      </div>
    </div>
    <div class="right">
      <a [href]="project.liveDemo" target="_blank"
          rel="noopener noreferrer"><button>View Project</button></a>
      <img src="../../assets/samuel-regan-asante-awXQiHUF4IU-unsplash.jpg" />
    </div>
  </div>

 <app-archive-projects></app-archive-projects>
</section>
